services:
  cache-db:
    image: redis:7-alpine
    container_name: proxy_redis-cache
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    #restart: unless-stopped
  
  proxy-server:
    build: .
    container_name: cache_proxy_app
    ports:
      - "3000:3000"
    environment:
      - REDIS_HOST=cache-db
      - REDIS_PORT=6379
    depends_on:
      cache-db:
        condition: service_healthy
    #restart: unless-stopped

    command: ["--port", "3000", "--origin", "https://dummyjson.com"]
